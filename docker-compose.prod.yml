services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    networks:
      - storycraft_network

  redis:
    image: redis:7-alpine
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru --requirepass ${REDIS_PASSWORD:-}
    volumes:
      - redis_data:/data
    restart: unless-stopped
    networks:
      - storycraft_network

  minio:
    image: minio/minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${S3_KEY}
      MINIO_ROOT_PASSWORD: ${S3_SECRET}
    volumes:
      - minio_data:/data
    restart: unless-stopped
    networks:
      - storycraft_network

  php-fpm:
    build:
      context: ./backend
      dockerfile: Dockerfile
    depends_on:
      postgres:
        condition: service_started
      redis:
        condition: service_started
    environment:
      APP_ENV: prod
    restart: unless-stopped
    networks:
      - storycraft_network

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    depends_on:
      postgres:
        condition: service_started
      redis:
        condition: service_started
    entrypoint: ["sh", "-c", "mkdir -p var/cache var/log && chown -R www-data:www-data var/ && php bin/console messenger:consume async --time-limit=3600"]
    environment:
      APP_ENV: prod
    restart: unless-stopped
    networks:
      - storycraft_network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    networks:
      - storycraft_network

  nginx:
    image: nginx:alpine
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "80:80"
    depends_on:
      - php-fpm
      - frontend
    restart: unless-stopped
    networks:
      - storycraft_network

volumes:
  postgres_data:
  redis_data:
  minio_data:

networks:
  storycraft_network:
    driver: bridge
