# yaml-language-server: $schema=../vendor/symfony/dependency-injection/Loader/schema/services.schema.json

# This file is the entry point to configure your own services.
# Files in the packages/ subdirectory configure your dependencies.
# See also https://symfony.com/doc/current/service_container/import.html

# Put parameters here that don't need to change on each machine where the app is deployed
# https://symfony.com/doc/current/best_practices.html#use-parameters-for-application-configuration
parameters:
    app.image_provider: '%env(IMAGE_PROVIDER)%'

services:
    # default configuration for services in *this* file
    _defaults:
        autowire: true      # Automatically injects dependencies in your services.
        autoconfigure: true # Automatically registers your services as commands, event subscribers, etc.

    # makes classes in src/ available to be used as services
    # this creates a service per class whose id is the fully-qualified class name
    App\:
        resource: '../src/'

    App\Service\AnthropicStoryProvider:
        arguments:
            $baseUrl: '%env(ANTHROPIC_BASE_URL)%'
            $apiKey: '%env(ANTHROPIC_API_KEY)%'
            $model: '%env(ANTHROPIC_MODEL)%'

    App\Service\GeminiStoryProvider:
        arguments:
            $apiKey: '%env(GEMINI_API_KEY)%'

    App\Service\CloudflareImageProvider:
        arguments:
            $accountId: '%env(CF_ACCOUNT_ID)%'
            $apiToken: '%env(CF_API_TOKEN)%'

    App\Service\GeminiImageProvider:
        arguments:
            $apiKey: '%env(GEMINI_API_KEY)%'

    App\Service\StorageService:
        arguments:
            $endpoint: '%env(S3_ENDPOINT)%'
            $key: '%env(S3_KEY)%'
            $secret: '%env(S3_SECRET)%'
            $bucket: '%env(S3_BUCKET)%'
            $region: '%env(S3_REGION)%'
            $publicUrl: '%env(S3_PUBLIC_URL)%'

    Hidehalo\Nanoid\Client: ~

    App\Service\SubscriptionService:
        arguments:
            $basicPriceId: '%env(STRIPE_BASIC_PRICE_ID)%'
            $proPriceId: '%env(STRIPE_PRO_PRICE_ID)%'

    App\Service\ReferralService:
        arguments:
            $stripeSecretKey: '%env(STRIPE_SECRET_KEY)%'

    App\Controller\SubscriptionController:
        arguments:
            $frontendUrl: '%env(APP_FRONTEND_URL)%'
            $stripeSecretKey: '%env(STRIPE_SECRET_KEY)%'
            $basicPriceId: '%env(STRIPE_BASIC_PRICE_ID)%'
            $proPriceId: '%env(STRIPE_PRO_PRICE_ID)%'
            $stripeWebhookSecret: '%env(STRIPE_WEBHOOK_SECRET)%'

    App\Controller\ReferralController:
        arguments:
            $frontendUrl: '%env(APP_FRONTEND_URL)%'
