security:
    password_hashers:
        Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface: 'auto'

    providers:
        doctrine:
            entity:
                class: App\Entity\User
                property: email

    firewalls:
        dev:
            pattern: ^/(_profiler|_wdt|assets|build)/
            security: false
        auth:
            pattern: ^/api/auth/(google|dev-login)
            security: false
        health:
            pattern: ^/api/health$
            security: false
        api:
            pattern: ^/api/
            stateless: true
            provider: doctrine
            jwt: ~
            entry_point: jwt

    access_control:
        - { path: ^/api/auth/(google|dev-login|refresh), roles: PUBLIC_ACCESS }
        - { path: ^/api/health, roles: PUBLIC_ACCESS }
        - { path: ^/api/templates, roles: PUBLIC_ACCESS }
        - { path: ^/api, roles: ROLE_USER }

when@test:
    security:
        password_hashers:
            Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface:
                algorithm: auto
                cost: 4
                time_cost: 3
                memory_cost: 10
