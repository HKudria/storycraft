framework:
    messenger:
        failure_transport: failed

        transports:
            async:
                dsn: '%env(MESSENGER_TRANSPORT_DSN)%'
                retry_strategy:
                    max_retries: 3
                    multiplier: 2
                    max_delay: 600000
            failed:
                dsn: '%env(MESSENGER_TRANSPORT_DSN)%/failed'

        routing:
            'App\Message\GenerateStoryMessage': async
            'App\Message\GenerateIllustrationMessage': async
            'App\Message\GeneratePdfMessage': async
